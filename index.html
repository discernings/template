<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evidence Template</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --panel: #161616;
    --accent: #4caf72;
    --accent2: #2e7d4f;
    --accent-tint: #0d2316;
    --text: #e8e8e8;
    --muted: #666;
    --border: #2a2a2a;
    --slot-bg: #111;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.85;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { opacity: 0.88; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── CONTROLS PANEL ── */
  .controls {
    width: 100%;
    max-width: 900px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    align-items: flex-end;
  }

  .controls-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .controls label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .color-swatch {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }

  .color-swatch span {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 34px;
    height: 34px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 4px; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

  input[type="text"], textarea {
    font-family: inherit;
    font-size: 13px;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }

  select {
    font-family: inherit;
    font-size: 12px;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  /* ── TEMPLATE CARD ── */
  #template-card {
    width: 100%;
    max-width: 900px;
    background: var(--slot-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .template-header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .template-title-input {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: transparent;
    border: none;
    color: var(--text);
    border-bottom: 1px dashed var(--border);
    padding: 2px 6px;
    width: 260px;
    outline: none;
    transition: border-color 0.15s;
  }
  .template-title-input:focus { border-color: var(--accent); }

  .template-meta {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .template-body {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── SECTION ── */
  .section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label-text {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent2);
    padding: 3px 10px;
    border-radius: 4px;
    background: var(--accent-tint);
  }

  .section-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-note {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── IMAGE SLOTS ── */
  .images-grid {
    display: grid;
    gap: 12px;
  }

  .images-grid { grid-template-columns: 1fr; }

  .img-slot {
    position: relative;
    border: 2px dashed var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--panel);
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .img-slot:hover { border-color: var(--accent); }

  .img-slot.has-image {
    border-style: solid;
    border-color: var(--border);
    min-height: unset;
    display: block;
    line-height: 0;
  }
  .img-slot.has-image:hover { border-color: var(--accent); }

  .img-slot img {
    width: 100%;
    height: auto;
    display: block;
  }

  .img-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    padding: 30px;
    text-align: center;
    pointer-events: none;
  }

  .img-placeholder svg { opacity: 0.4; }

  .img-placeholder span {
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .img-placeholder small {
    font-size: 10px;
    opacity: 0.6;
  }

  .img-slot.has-image { position: relative; }

  .slot-remove {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: #fff;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 12px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    z-index: 10;
    transition: background 0.15s;
  }
  .slot-remove:hover { background: #c0392b; }
  .img-slot.has-image:hover .slot-remove { display: flex; }

  .hidden-input { display: none; }

  /* ── TEXT AREAS ── */
  .section-textarea {
    width: 100%;
    min-height: 80px;
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── DRAG OVERLAY ── */
  .drag-over { border-color: var(--accent) !important; background: color-mix(in srgb, var(--accent) 6%, var(--panel)); }

  /* ── REPLIES SLOT COUNTER ── */
  .slot-count-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .slot-count-controls button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    width: 24px;
    height: 24px;
    border-radius: 4px;
    padding: 0;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slot-count-controls button:hover { border-color: var(--accent); color: var(--accent); }

  /* ── THEME PRESETS ── */
  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .preset-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.1s;
  }
  .preset-dot:hover { transform: scale(1.15); border-color: #fff3; }
  .preset-dot.active { border-color: #fff; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── WATERMARK (optional) ── */
  .watermark {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    opacity: 0.4;
    text-align: right;
    padding: 10px 20px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">◈ Evidence Template</div>
  <div class="header-actions">
    <button class="btn-ghost" onclick="clearAll()">Clear All</button>
    <button class="btn-primary" onclick="downloadJPEG()">↓ Download JPEG</button>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <!-- Colors -->
  <div class="controls-group">
    <label>Theme Presets</label>
    <div class="presets" id="presets"></div>
  </div>

  <div class="controls-group">
    <label>Customize Colors</label>
    <div class="color-row">
      <div class="color-swatch">
        <input type="color" id="colorBg" value="#0d0d0d" onchange="applyColor('--bg', this.value)">
        <span>BG</span>
      </div>
      <div class="color-swatch">
        <input type="color" id="colorPanel" value="#161616" onchange="applyColor('--panel', this.value)">
        <span>Panel</span>
      </div>
      <div class="color-swatch">
        <input type="color" id="colorAccent" value="#4caf72" onchange="applyAccent(this.value)">
        <span>Accent</span>
      </div>
      <div class="color-swatch">
        <input type="color" id="colorText" value="#e8e8e8" onchange="applyColor('--text', this.value)">
        <span>Text</span>
      </div>
      <div class="color-swatch">
        <input type="color" id="colorSlot" value="#111111" onchange="applyColor('--slot-bg', this.value)">
        <span>Card</span>
      </div>
    </div>
  </div>

  <div class="controls-group">
    <label>Replies Slots</label>
    <div class="slot-count-controls">
      <button onclick="changeRepliesCount(-1)">−</button>
      <span id="replies-count-label">2</span>
      <button onclick="changeRepliesCount(1)">+</button>
    </div>
  </div>

  <div class="controls-group">
    <label>Date / Tag</label>
    <input type="text" id="metaInput" placeholder="e.g. 2025-06-16 · #moderation" style="width:210px">
  </div>
</div>

<!-- TEMPLATE CARD -->
<div id="template-card">
  <div class="template-header">
    <input class="template-title-input" type="text" id="cardTitle" placeholder="Case title or description…" value="">
    <div class="template-meta" id="metaDisplay">—</div>
  </div>

  <div class="template-body">

    <!-- CONTEXT SECTION -->
    <div class="section" id="section-context">
      <div class="section-label">
        <div class="section-label-text">Context</div>
        <div class="section-divider"></div>
      </div>
      <div class="images-grid count-1" id="context-grid">
        <!-- single context slot -->
      </div>
      <textarea class="section-textarea" id="contextNote" placeholder="Describe the context of this evidence…"></textarea>
    </div>

    <!-- REPLIES SECTION -->
    <div class="section" id="section-replies">
      <div class="section-label">
        <div class="section-label-text">Replies</div>
        <div class="section-divider"></div>
      </div>
      <div class="images-grid count-2" id="replies-grid">
        <!-- slots populated by JS -->
      </div>
      <textarea class="section-textarea" id="repliesNote" placeholder="Describe the replies or additional context…"></textarea>
    </div>

  </div>

  <div class="watermark" id="watermark">evidence template</div>
</div>

<div id="toast">Downloaded!</div>
<input type="file" class="hidden-input" id="masterFileInput" accept="image/*">

<script>
// ── STATE ──
let repliesCount = 2;
const contextImages = [null];
const repliesImages = [null, null, null];
const repliesDims = [null, null, null]; // { w, h } for each reply image
let activeSlot = null; // { section, index }

// ── THEME PRESETS ──
const themes = [
  { name: 'Forest', bg: '#0d0d0d', panel: '#161616', accent: '#4caf72', text: '#e8e8e8', slot: '#111111' },
  { name: 'Midnight', bg: '#0a0a1a', panel: '#12122a', accent: '#7c6af7', text: '#e0deff', slot: '#0e0e22' },
  { name: 'Crimson', bg: '#110a0a', panel: '#1e1010', accent: '#e05252', text: '#f0e8e8', slot: '#150c0c' },
  { name: 'Ash', bg: '#111111', panel: '#1e1e1e', accent: '#b0b0b0', text: '#eeeeee', slot: '#161616' },
  { name: 'Ivory', bg: '#f5f3ee', panel: '#ece9e1', accent: '#8b6f47', text: '#1a1a1a', slot: '#f0ede6' },
  { name: 'Ocean', bg: '#060d12', panel: '#0c1a22', accent: '#29b6d8', text: '#d6f0f7', slot: '#09141b' },
];

function buildPresets() {
  const el = document.getElementById('presets');
  themes.forEach((t, i) => {
    const d = document.createElement('div');
    d.className = 'preset-dot' + (i === 0 ? ' active' : '');
    d.style.background = t.accent;
    d.title = t.name;
    d.onclick = () => {
      applyTheme(t);
      document.querySelectorAll('.preset-dot').forEach(p => p.classList.remove('active'));
      d.classList.add('active');
    };
    el.appendChild(d);
  });
}

function applyTheme(t) {
  applyColor('--bg', t.bg);
  applyColor('--panel', t.panel);
  applyColor('--slot-bg', t.slot);
  applyColor('--text', t.text);
  applyAccent(t.accent);
  document.getElementById('colorBg').value = t.bg;
  document.getElementById('colorPanel').value = t.panel;
  document.getElementById('colorSlot').value = t.slot;
  document.getElementById('colorText').value = t.text;
  document.getElementById('colorAccent').value = t.accent;
}

function applyColor(varName, val) {
  document.documentElement.style.setProperty(varName, val);
}

function applyAccent(val) {
  applyColor('--accent', val);
  applyColor('--accent2', darken(val, 0.25));
  applyColor('--accent-tint', darken(val, 0.72));
}

function darken(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.floor(r * (1 - amount)));
  g = Math.max(0, Math.floor(g * (1 - amount)));
  b = Math.max(0, Math.floor(b * (1 - amount)));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ── META ──
document.getElementById('metaInput').addEventListener('input', function() {
  const v = this.value.trim();
  document.getElementById('metaDisplay').textContent = v || '—';
});

// ── SLOT BUILDING ──
function buildSlot(section, index, imgArr) {
  const slot = document.createElement('div');
  slot.className = 'img-slot' + (imgArr[index] ? ' has-image' : '');
  slot.dataset.section = section;
  slot.dataset.index = index;

  if (imgArr[index]) {
    const img = document.createElement('img');
    img.src = imgArr[index];
    slot.appendChild(img);
    slot.style.alignSelf = 'start';
    const rm = document.createElement('button');
    rm.className = 'slot-remove';
    rm.textContent = '×';
    rm.onclick = (e) => { e.stopPropagation(); clearSlot(section, index); };
    slot.appendChild(rm);
  } else {
    const ph = document.createElement('div');
    ph.className = 'img-placeholder';
    ph.innerHTML = `
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span>Click or drop image</span>
      <small>PNG · JPG · GIF · WEBP</small>
    `;
    slot.appendChild(ph);
  }

  slot.addEventListener('click', () => openFilePicker(section, index));
  slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-over'); });
  slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
  slot.addEventListener('drop', e => {
    e.preventDefault();
    slot.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file, section, index);
  });

  return slot;
}

function renderContextGrid() {
  const grid = document.getElementById('context-grid');
  grid.innerHTML = '';
  grid.className = 'images-grid count-1';
  grid.appendChild(buildSlot('context', 0, contextImages));
}

function renderRepliesGrid() {
  const grid = document.getElementById('replies-grid');
  grid.innerHTML = '';

  // Decide layout: images with ratio <= 1.2 (square/portrait-ish) go side by side
  // Images that are wide/tall go full width stacked
  const activeImages = repliesImages.slice(0, repliesCount);
  const activeDims = repliesDims.slice(0, repliesCount);

  // Check if ALL loaded images are "small" (ratio w/h <= 1.2)
  const loadedDims = activeDims.filter(Boolean);
  const allSmall = loadedDims.length > 0 && loadedDims.every(d => (d.w / d.h) <= 1.2);

  if (allSmall && repliesCount > 1) {
    // Side by side, each slot wraps its own image height
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = repliesCount === 2 ? '1fr 1fr' : '1fr 1fr 1fr';
    grid.style.gap = '12px';
    grid.style.alignItems = 'start';
  } else {
    // Stacked vertically
    grid.style.display = 'grid';
    grid.style.gridTemplateColumns = '1fr';
    grid.style.gap = '12px';
  }

  for (let i = 0; i < repliesCount; i++) {
    grid.appendChild(buildSlot('replies', i, repliesImages));
  }
  document.getElementById('replies-count-label').textContent = repliesCount;
  document.querySelector('#section-replies .section-label-text').textContent = repliesCount === 1 ? 'Reply' : 'Replies';
}

// ── FILE HANDLING ──
function openFilePicker(section, index) {
  activeSlot = { section, index };
  document.getElementById('masterFileInput').value = '';
  document.getElementById('masterFileInput').click();
}

document.getElementById('masterFileInput').addEventListener('change', function() {
  if (this.files[0] && activeSlot) {
    loadImage(this.files[0], activeSlot.section, activeSlot.index);
  }
});

function loadImage(file, section, index) {
  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    if (section === 'context') {
      contextImages[index] = src;
      renderContextGrid();
    } else {
      // Get image dimensions before rendering
      const img = new Image();
      img.onload = () => {
        repliesImages[index] = src;
        repliesDims[index] = { w: img.naturalWidth, h: img.naturalHeight };
        renderRepliesGrid();
      };
      img.src = src;
    }
  };
  reader.readAsDataURL(file);
}

function clearSlot(section, index) {
  if (section === 'context') contextImages[index] = null;
  else { repliesImages[index] = null; repliesDims[index] = null; }
  section === 'context' ? renderContextGrid() : renderRepliesGrid();
}

// ── REPLIES COUNT ──
function changeRepliesCount(delta) {
  const next = repliesCount + delta;
  if (next < 1 || next > 3) return;
  repliesCount = next;
  renderRepliesGrid();
}

// ── CLEAR ALL ──
function clearAll() {
  contextImages[0] = null;
  repliesImages.fill(null);
  repliesDims.fill(null);
  renderContextGrid();
  renderRepliesGrid();
  document.getElementById('cardTitle').value = '';
  document.getElementById('metaInput').value = '';
  document.getElementById('metaDisplay').textContent = '—';
  document.getElementById('contextNote').value = '';
  document.getElementById('repliesNote').value = '';
}

// ── DOWNLOAD JPEG ──
async function downloadJPEG() {
  const card = document.getElementById('template-card');
  const btn = document.querySelector('.btn-primary');
  const origText = btn.textContent;
  btn.textContent = 'Rendering…';
  btn.disabled = true;

  try {
    const slotBg = getComputedStyle(document.documentElement)
      .getPropertyValue('--slot-bg').trim() || '#111111';

    // Hide watermark and empty fields before capture
    const watermark = document.getElementById('watermark');
    watermark.style.display = 'none';

    // Hide empty textareas and title
    const cardTitle = document.getElementById('cardTitle');
    const contextNote = document.getElementById('contextNote');
    const repliesNote = document.getElementById('repliesNote');
    const metaDisplay = document.getElementById('metaDisplay');
    const templateHeader = document.querySelector('.template-header');

    const titleEmpty = !cardTitle.value.trim();
    const metaEmpty = metaDisplay.textContent === '—';
    const contextEmpty = !contextNote.value.trim();
    const repliesEmpty = !repliesNote.value.trim();

    if (titleEmpty && metaEmpty) templateHeader.style.display = 'none';
    if (contextEmpty) contextNote.style.display = 'none';
    if (repliesEmpty) repliesNote.style.display = 'none';

    const canvas = await html2canvas(card, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: slotBg,
      logging: false,
      removeContainer: true,
      width: card.scrollWidth,
      height: card.scrollHeight,
    });

    canvas.toBlob(blob => {
      watermark.style.display = '';
      templateHeader.style.display = '';
      contextNote.style.display = '';
      repliesNote.style.display = '';
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `evidence-${Date.now()}.jpg`;
      link.href = url;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast('Downloaded!');
    }, 'image/jpeg', 0.95);

  } catch(err) {
    document.getElementById('watermark').style.display = '';
    document.querySelector('.template-header').style.display = '';
    document.getElementById('contextNote').style.display = '';
    document.getElementById('repliesNote').style.display = '';
    console.error('html2canvas error:', err);
    showToast('Error: ' + (err.message || 'try again'));
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
buildPresets();
renderContextGrid();
renderRepliesGrid();
</script>
</body>
</html>
