<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation Template - Dinâmico</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header com controles -->
        <header class="app-header">
            <h1>🛡️ Template de Moderação</h1>
            <div class="header-controls">
                <button class="btn-settings" id="settingsBtn">
                    <i class="fas fa-palette"></i> Cores
                </button>
                <button class="btn-export" onclick="downloadTemplate()">
                    <i class="fas fa-download"></i> Baixar JPEG
                </button>
            </div>
        </header>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Personalizar Cores</h2>
                <div class="color-grid">
                    <div class="color-input">
                        <label>Cor Primária:</label>
                        <input type="color" id="colorPrimary" value="#3498db">
                    </div>
                    <div class="color-input">
                        <label>Cor Background:</label>
                        <input type="color" id="colorBg" value="#ffffff">
                    </div>
                    <div class="color-input">
                        <label>Cor Context:</label>
                        <input type="color" id="colorContext" value="#e8f4f8">
                    </div>
                    <div class="color-input">
                        <label>Cor Replies:</label>
                        <input type="color" id="colorReplies" value="#f8e8e8">
                    </div>
                </div>
                <button class="btn-reset" id="resetColors">Restaurar Padrão</button>
            </div>
        </div>

        <!-- Template Container -->
        <div class="template-wrapper">
            <div id="templateCanvas" class="template-canvas">
                
                <!-- Seção Context (Esquerda) -->
                <div class="template-section context-section">
                    <div class="section-label">CONTEXTO</div>
                    <div class="arrow-left">←</div>
                    <div class="section-content">
                        <textarea id="contextInput" placeholder="Escreva o contexto aqui..." class="textarea-input"></textarea>
                    </div>
                </div>

                <!-- Seção Central (Imagens) -->
                <div class="template-center">
                    <div class="images-container">
                        <label for="fileInput1" class="image-slot" id="slot1">
                            <input type="file" id="fileInput1" class="image-input" onchange="loadImage(1, event)" accept="image/*">
                            <div class="image-placeholder">
                                <i class="fas fa-image"></i>
                                <p>Imagem 1</p>
                                <small>Clique para selecionar</small>
                            </div>
                            <img id="img1" class="image-display" style="display: none;">
                        </label>

                        <label for="fileInput2" class="image-slot" id="slot2">
                            <input type="file" id="fileInput2" class="image-input" onchange="loadImage(2, event)" accept="image/*">
                            <div class="image-placeholder">
                                <i class="fas fa-image"></i>
                                <p>Imagem 2</p>
                                <small>Clique para selecionar</small>
                            </div>
                            <img id="img2" class="image-display" style="display: none;">
                        </label>

                        <label for="fileInput3" class="image-slot" id="slot3" style="display: none;">
                            <input type="file" id="fileInput3" class="image-input" onchange="loadImage(3, event)" accept="image/*">
                            <div class="image-placeholder">
                                <i class="fas fa-image"></i>
                                <p>Imagem 3</p>
                                <small>Clique para selecionar</small>
                            </div>
                            <img id="img3" class="image-display" style="display: none;">
                        </label>
                    </div>
                    <button class="btn-add-image" onclick="toggleImageSlot()">+ Adicionar Imagem</button>
                </div>

                <!-- Seção Replies (Direita) -->
                <div class="template-section replies-section">
                    <div class="section-label">RESPOSTAS</div>
                    <div class="arrow-right">→</div>
                    <div class="section-content">
                        <div class="replies-input">
                            <input type="text" id="replyUser" placeholder="Usuário..." class="input-reply">
                            <textarea id="replyContent" placeholder="Resposta..." class="textarea-reply"></textarea>
                            <button class="btn-add-reply" onclick="addReply()">
                                <i class="fas fa-plus"></i> Adicionar
                            </button>
                        </div>
                        <div id="repliesList" class="replies-list"></div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Toolbar abaixo do template -->
        <div class="toolbar">
            <button class="btn-toolbar" onclick="clearAll()">
                <i class="fas fa-trash"></i> Limpar Tudo
            </button>
            <button class="btn-toolbar" onclick="downloadTemplate()">
                <i class="fas fa-download"></i> Baixar JPEG
            </button>
            <button class="btn-toolbar" onclick="downloadTemplatePNG()">
                <i class="fas fa-download"></i> Baixar PNG
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
