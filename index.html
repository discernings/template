<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation Evidence Template</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🛡️ Moderation Evidence Template</h1>
            <button class="settings-btn" id="settingsBtn">
                <i class="fas fa-cog"></i> Settings
            </button>
        </header>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Customize Colors</h2>
                <div class="color-settings">
                    <div class="color-group">
                        <label for="primaryColor">Primary Color:</label>
                        <input type="color" id="primaryColor" value="#3498db">
                    </div>
                    <div class="color-group">
                        <label for="secondaryColor">Secondary Color:</label>
                        <input type="color" id="secondaryColor" value="#2ecc71">
                    </div>
                    <div class="color-group">
                        <label for="accentColor">Accent Color:</label>
                        <input type="color" id="accentColor" value="#e74c3c">
                    </div>
                    <div class="color-group">
                        <label for="bgColor">Background Color:</label>
                        <input type="color" id="bgColor" value="#ecf0f1">
                    </div>
                </div>
                <button class="reset-btn" id="resetColors">Reset to Default</button>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Evidence Header -->
            <section class="evidence-header">
                <div class="header-inputs">
                    <input type="text" id="caseId" placeholder="Case ID" class="input-field">
                    <input type="text" id="reportedUser" placeholder="Reported User" class="input-field">
                    <input type="date" id="incidentDate" class="input-field">
                </div>
            </section>

            <!-- Image Windows -->
            <section class="image-gallery">
                <h2>Evidence Images <span class="window-count">(2-3 Windows)</span></h2>
                <div class="image-windows">
                    <div class="image-window" id="imgWindow1">
                        <div class="window-header">
                            <span>Image 1</span>
                            <button class="remove-btn" onclick="removeWindow(1)">×</button>
                        </div>
                        <div class="image-container">
                            <input type="file" class="image-input" onchange="loadImage(1, event)">
                            <div class="image-placeholder" id="imgPlaceholder1">
                                <i class="fas fa-image"></i>
                                <p>Click to upload image</p>
                            </div>
                            <img id="img1" class="image-display" style="display: none;">
                        </div>
                        <div class="image-controls">
                            <button class="btn-small" onclick="zoomImage(1, 1.1)">
                                <i class="fas fa-search-plus"></i>
                            </button>
                            <button class="btn-small" onclick="zoomImage(1, 0.9)">
                                <i class="fas fa-search-minus"></i>
                            </button>
                            <button class="btn-small" onclick="downloadImage(1)">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>

                    <div class="image-window" id="imgWindow2">
                        <div class="window-header">
                            <span>Image 2</span>
                            <button class="remove-btn" onclick="removeWindow(2)">×</button>
                        </div>
                        <div class="image-container">
                            <input type="file" class="image-input" onchange="loadImage(2, event)">
                            <div class="image-placeholder" id="imgPlaceholder2">
                                <i class="fas fa-image"></i>
                                <p>Click to upload image</p>
                            </div>
                            <img id="img2" class="image-display" style="display: none;">
                        </div>
                        <div class="image-controls">
                            <button class="btn-small" onclick="zoomImage(2, 1.1)">
                                <i class="fas fa-search-plus"></i>
                            </button>
                            <button class="btn-small" onclick="zoomImage(2, 0.9)">
                                <i class="fas fa-search-minus"></i>
                            </button>
                            <button class="btn-small" onclick="downloadImage(2)">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>

                    <div class="image-window" id="imgWindow3" style="display: none;">
                        <div class="window-header">
                            <span>Image 3</span>
                            <button class="remove-btn" onclick="removeWindow(3)">×</button>
                        </div>
                        <div class="image-container">
                            <input type="file" class="image-input" onchange="loadImage(3, event)">
                            <div class="image-placeholder" id="imgPlaceholder3">
                                <i class="fas fa-image"></i>
                                <p>Click to upload image</p>
                            </div>
                            <img id="img3" class="image-display" style="display: none;">
                        </div>
                        <div class="image-controls">
                            <button class="btn-small" onclick="zoomImage(3, 1.1)">
                                <i class="fas fa-search-plus"></i>
                            </button>
                            <button class="btn-small" onclick="zoomImage(3, 0.9)">
                                <i class="fas fa-search-minus"></i>
                            </button>
                            <button class="btn-small" onclick="downloadImage(3)">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <button class="add-window-btn" id="addWindowBtn" onclick="addWindow()">
                    <i class="fas fa-plus"></i> Add Image Window
                </button>
            </section>

            <!-- Context Section -->
            <section class="collapsible-section">
                <div class="section-header" onclick="toggleSection(this)">
                    <i class="fas fa-chevron-down arrow"></i>
                    <h2>📋 Context</h2>
                </div>
                <div class="section-content">
                    <textarea id="contextText" placeholder="Enter context details about the incident..." class="textarea-field"></textarea>
                    <div class="section-stats">
                        <span id="contextCount">0</span> characters
                    </div>
                </div>
            </section>

            <!-- Replies Section -->
            <section class="collapsible-section">
                <div class="section-header" onclick="toggleSection(this)">
                    <i class="fas fa-chevron-down arrow"></i>
                    <h2>💬 Replies</h2>
                </div>
                <div class="section-content">
                    <div class="add-reply-controls">
                        <input type="text" id="replyUserInput" placeholder="User name" class="input-field">
                        <textarea id="replyContentInput" placeholder="Reply content..." class="textarea-field"></textarea>
                        <button class="btn-primary" onclick="addReply()">
                            <i class="fas fa-plus"></i> Add Reply
                        </button>
                    </div>
                    <div id="repliesList" class="replies-list"></div>
                </div>
            </section>

            <!-- Export Section -->
            <section class="export-section">
                <h2>📤 Export Evidence</h2>
                <div class="export-buttons">
                    <button class="btn-export" onclick="exportJSON()">
                        <i class="fas fa-file-code"></i> Export as JSON
                    </button>
                    <button class="btn-export" onclick="exportHTML()">
                        <i class="fas fa-file-html5"></i> Export as HTML
                    </button>
                    <button class="btn-export" onclick="clearAll()">
                        <i class="fas fa-trash"></i> Clear All
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Image Viewer Modal -->
    <div id="imageViewerModal" class="modal">
        <span class="close" onclick="closeImageViewer()">&times;</span>
        <img class="modal-image" id="modalImage">
        <div class="modal-controls">
            <button onclick="rotateImage()"><i class="fas fa-redo"></i> Rotate</button>
            <button onclick="toggleFullscreen()"><i class="fas fa-expand"></i> Fullscreen</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
